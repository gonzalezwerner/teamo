<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geraldine en 3D 💘</title>
  <style>
    :root {
      --pink: #ff5eb5;
      --magenta: #ff2f8c;
      --purple: #6b27ff;
      --glass: rgba(255, 255, 255, 0.14);
      --text: #fff1fa;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 20%, #2c0f5c, #11001d 45%, #040008 100%);
    }

    #scene {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    .ui {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      pointer-events: none;
      z-index: 3;
    }

    .hero {
      margin: 16px;
      padding: 18px;
      border-radius: 20px;
      backdrop-filter: blur(8px);
      background: linear-gradient(140deg, rgba(255, 94, 181, .22), rgba(107, 39, 255, .14));
      border: 1px solid rgba(255, 255, 255, .24);
      box-shadow: 0 10px 30px rgba(0,0,0,.38);
      pointer-events: auto;
      max-width: 720px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 2.6rem);
      text-shadow: 0 5px 16px rgba(255, 47, 140, .6);
    }

    .hero p { margin: 6px 0 0; opacity: .94; }

    .controls {
      align-self: end;
      margin: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      pointer-events: auto;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 11px 12px;
      font-weight: 700;
      cursor: pointer;
      color: #300d3f;
      background: linear-gradient(180deg, #ffe7f7, #ffc4e9);
      box-shadow: 0 8px 24px rgba(255, 47, 140, .35);
      transition: transform .15s ease;
    }

    button:hover { transform: translateY(-2px); }

    .badge {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.18);
      font-size: .9rem;
    }

    .phrase {
      margin: 10px 16px;
      max-width: 580px;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--glass);
      border: 1px solid rgba(255, 255, 255, .25);
      box-shadow: 0 6px 20px rgba(0, 0, 0, .25);
      pointer-events: auto;
      min-height: 52px;
      line-height: 1.4;
    }

    .hint {
      position: fixed;
      right: 14px;
      top: 18px;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: .85rem;
      background: rgba(0,0,0,.38);
      border: 1px solid rgba(255,255,255,.18);
      z-index: 4;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>

  <div class="ui">
    <section class="hero">
      <h1>Geraldine, eres un sueño en 3D ✨💖</h1>
      <p>Versión <strong>demasiado WOW</strong>: corazón 3D vivo, partículas, brillo, rotación y explosiones románticas.</p>
      <span class="badge" id="kissCount">Besitos 3D: 0</span>
    </section>

    <div class="phrase" id="phraseBox"></div>

    <section class="controls">
      <button id="btnPulse">Pulso de Amor</button>
      <button id="btnStorm">Tormenta de Corazones</button>
      <button id="btnPhrase">Nueva Frase</button>
      <button id="btnKiss">+10 Besitos</button>
      <button id="btnColor">Modo Neón</button>
    </section>
  </div>

  <div class="hint">Arrastra para girar • rueda para zoom • clic para explotar amor</div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.164.1/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.164.1/examples/jsm/controls/OrbitControls.js';

    const canvas = document.getElementById('scene');
    const phraseBox = document.getElementById('phraseBox');
    const kissCount = document.getElementById('kissCount');

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x14001f, 0.045);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0.6, 5.6);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 2.4;
    controls.maxDistance = 11;

    const ambient = new THREE.AmbientLight(0xffc6e9, 1.3);
    const key = new THREE.PointLight(0xff66b8, 26, 30, 2);
    key.position.set(2.5, 2.2, 2.2);
    const rim = new THREE.PointLight(0x7a5cff, 18, 30, 2);
    rim.position.set(-3.2, -1.5, -2.5);
    scene.add(ambient, key, rim);

    const group = new THREE.Group();
    scene.add(group);

    function createHeartShape(scale = 1) {
      const s = new THREE.Shape();
      s.moveTo(0, 0.2 * scale);
      s.bezierCurveTo(0, 0.2 * scale, -0.6 * scale, -0.4 * scale, -1.2 * scale, 0.2 * scale);
      s.bezierCurveTo(-2 * scale, 1 * scale, -0.7 * scale, 2.3 * scale, 0, 2.8 * scale);
      s.bezierCurveTo(0.7 * scale, 2.3 * scale, 2 * scale, 1 * scale, 1.2 * scale, 0.2 * scale);
      s.bezierCurveTo(0.6 * scale, -0.4 * scale, 0, 0.2 * scale, 0, 0.2 * scale);
      return s;
    }

    const heartGeo = new THREE.ExtrudeGeometry(createHeartShape(0.85), {
      depth: 0.85,
      bevelEnabled: true,
      bevelThickness: 0.22,
      bevelSize: 0.18,
      bevelSegments: 10,
      curveSegments: 28
    });
    heartGeo.center();

    const heartMat = new THREE.MeshPhysicalMaterial({
      color: 0xff3d9a,
      emissive: 0x6d0f4f,
      emissiveIntensity: 0.8,
      metalness: 0.08,
      roughness: 0.18,
      clearcoat: 1,
      clearcoatRoughness: 0.1,
      reflectivity: 1,
      transmission: 0.06
    });

    const heart = new THREE.Mesh(heartGeo, heartMat);
    heart.castShadow = false;
    group.add(heart);

    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(2.25, 0.045, 20, 240),
      new THREE.MeshBasicMaterial({ color: 0xff8aca, transparent: true, opacity: 0.45 })
    );
    ring.rotation.x = Math.PI * 0.33;
    group.add(ring);

    const particleCount = 2400;
    const positions = new Float32Array(particleCount * 3);
    const sizes = new Float32Array(particleCount);
    for (let i = 0; i < particleCount; i++) {
      const r = 3 + Math.random() * 10;
      const a = Math.random() * Math.PI * 2;
      const y = (Math.random() - 0.5) * 8;
      positions[i * 3] = Math.cos(a) * r;
      positions[i * 3 + 1] = y;
      positions[i * 3 + 2] = Math.sin(a) * r;
      sizes[i] = Math.random();
    }

    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    pGeo.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

    const pMat = new THREE.PointsMaterial({
      size: 0.055,
      color: 0xffb3db,
      transparent: true,
      opacity: 0.85,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const particles = new THREE.Points(pGeo, pMat);
    scene.add(particles);

    const burstHearts = [];
    function spawnBurst(worldPoint) {
      for (let i = 0; i < 42; i++) {
        const g = new THREE.SphereGeometry(0.03 + Math.random() * 0.04, 8, 8);
        const m = new THREE.MeshBasicMaterial({ color: [0xff6ec7, 0xff2f8c, 0xff9ad7][i % 3] });
        const mesh = new THREE.Mesh(g, m);
        mesh.position.copy(worldPoint);
        const velocity = new THREE.Vector3(
          (Math.random() - 0.5) * 0.12,
          (Math.random() - 0.2) * 0.14,
          (Math.random() - 0.5) * 0.12
        );
        burstHearts.push({ mesh, velocity, life: 1 + Math.random() * 0.8 });
        scene.add(mesh);
      }
    }

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    window.addEventListener('click', (ev) => {
      pointer.x = (ev.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(ev.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hit = raycaster.intersectObject(heart)[0];
      if (hit) {
        spawnBurst(hit.point);
        heartMat.emissiveIntensity = 1.8;
        setTimeout(() => (heartMat.emissiveIntensity = 0.8), 220);
      }
    });

    const phrases = [
      'Geraldine, incluso en 3D te ves infinita en mi corazón.',
      'Si el universo fuera render, tú serías su luz más hermosa.',
      'Cada frame contigo se vuelve una obra de arte romántica.',
      'Tú + yo = la escena perfecta de amor eterno.'
    ];

    function typeText(text) {
      phraseBox.textContent = '';
      let i = 0;
      const id = setInterval(() => {
        phraseBox.textContent += text[i] || '';
        i++;
        if (i > text.length) clearInterval(id);
      }, 26);
    }

    let kisses = 0;
    function addKisses(n) {
      kisses += n;
      kissCount.textContent = `Besitos 3D: ${kisses}`;
      spawnBurst(new THREE.Vector3(0, 0.2, 0.2));
    }

    let stormTimer = null;
    let neon = false;

    document.getElementById('btnPulse').addEventListener('click', () => {
      heart.scale.setScalar(1.25);
      ring.scale.setScalar(1.2);
      setTimeout(() => {
        heart.scale.setScalar(1);
        ring.scale.setScalar(1);
      }, 200);
      addKisses(2);
    });

    document.getElementById('btnStorm').addEventListener('click', () => {
      clearInterval(stormTimer);
      stormTimer = setInterval(() => {
        const p = new THREE.Vector3((Math.random() - 0.5) * 3, Math.random() * 2.6, (Math.random() - 0.5) * 3);
        spawnBurst(p);
      }, 110);
      setTimeout(() => clearInterval(stormTimer), 2600);
    });

    document.getElementById('btnPhrase').addEventListener('click', () => {
      typeText(phrases[Math.floor(Math.random() * phrases.length)]);
    });

    document.getElementById('btnKiss').addEventListener('click', () => addKisses(10));

    document.getElementById('btnColor').addEventListener('click', () => {
      neon = !neon;
      heartMat.color.set(neon ? 0x8c7bff : 0xff3d9a);
      pMat.color.set(neon ? 0x9fe6ff : 0xffb3db);
      key.color.set(neon ? 0xa897ff : 0xff66b8);
      rim.color.set(neon ? 0x48d4ff : 0x7a5cff);
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    const clock = new THREE.Clock();
    function animate() {
      const t = clock.getElapsedTime();
      const dt = Math.min(clock.getDelta(), 0.033);

      heart.rotation.y += 0.0035;
      heart.rotation.x = Math.sin(t * 0.9) * 0.07;
      const s = 1 + Math.sin(t * 2.6) * 0.05;
      heart.scale.setScalar(s);

      ring.rotation.z += 0.003;
      ring.position.y = Math.sin(t * 1.2) * 0.12;

      particles.rotation.y += 0.0009;

      for (let i = burstHearts.length - 1; i >= 0; i--) {
        const b = burstHearts[i];
        b.life -= dt;
        b.mesh.position.addScaledVector(b.velocity, dt * 8);
        b.velocity.y -= dt * 0.045;
        b.mesh.scale.setScalar(Math.max(0.05, b.life));
        b.mesh.material.opacity = Math.max(0, b.life);
        b.mesh.material.transparent = true;
        if (b.life <= 0) {
          scene.remove(b.mesh);
          b.mesh.geometry.dispose();
          b.mesh.material.dispose();
          burstHearts.splice(i, 1);
        }
      }

      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    typeText(phrases[0]);
    animate();
  </script>
</body>
</html>
